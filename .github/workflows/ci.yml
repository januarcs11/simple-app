name: CI Self Hosted

on: [push]

env:
  IMAGE_NAME: jnr19coy/app-githubaction
  CONTAINER_NAME: backend-flask
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: start Telegram
      run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="🚀 Yes Job started: ${{ github.repository }}"

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Login to DockerHubs
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      run: docker build -t $REGISTRY/${{ env.IMAGE_NAME }}:latest .

    - name: Push image to DockerHub
      run: docker push $REGISTRY/${{ env.IMAGE_NAME }}:latest

    - name: Create SSH key file
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: SSH Deploy to VM
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
          echo "Logging into DockerHub..."
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          echo "Pulling latest image..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cicd-githubnew:latest
          echo "Stopping & removing old container..."
          docker stop  || true
          docker rm backend-flask || true
          echo "Running new container..."
          docker run -d --name backend-flask -p 5001:5001 ${{ secrets.DOCKERHUB_USERNAME }}/cicd-githubnew:latest
        
          EOF
     
